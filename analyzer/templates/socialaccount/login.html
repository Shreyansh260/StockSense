<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In Via Google — StockSense AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0a0c10; --surface: #111318; --border: #1f2733;
    --accent: #00e5a0; --text: #e8eaf0; --muted: #5a6478;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
}
body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
}
.card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 36px;
    width: 100%; max-width: 400px; text-align: center;
    animation: fadeUp 0.5s ease forwards;
}
.logo { font-size: 22px; font-weight: 800; margin-bottom: 28px; }
.logo span { color: var(--accent); }
.google-icon-wrap {
    width: 64px; height: 64px; border-radius: 50%;
    background: white; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
h2 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
p { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
.btn-continue {
    display: block; width: 100%;
    background: var(--accent); color: #000;
    border: none; border-radius: 12px;
    padding: 14px; font-family: var(--font-display);
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none;
}
.btn-continue:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,229,160,0.3); }
.btn-cancel {
    display: block; margin-top: 12px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--muted); text-decoration: none;
    transition: color 0.2s;
}
.btn-cancel:hover { color: var(--text); }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="card">
    <div class="logo">Stock<span>Sense</span> AI</div>

    <div class="google-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
    </div>

    <h2>Sign in with Google</h2>
    <p>You are about to sign in to <strong>StockSense AI</strong> using your Google account.</p>

    <form method="post" action="{% url 'google_login' %}">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
        <button type="submit" class="btn-continue">Continue with Google →</button>
    </form>

    <a href="/accounts/login/" class="btn-cancel">← Cancel, go back</a>
</div>
</body>
</html>
