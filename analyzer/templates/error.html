<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Error - AI Stock Sentiment Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: #f5f7fa;
}

.header {
    background: #1f2937;
    color: white;
    padding: 20px;
    text-align: center;
}

.error-box {
    max-width: 600px;
    margin: 80px auto;
    text-align: center;
}

.error-icon {
    font-size: 64px;
}

</style>

</head>

<body>

<div class="header">
    <h2>AI Stock Market Sentiment Analyzer</h2>
    <p>Analyze financial news using Transformer NLP</p>
</div>

<div class="container">
    <div class="error-box">

        <div class="error-icon">⚠️</div>

        <h3 class="mt-3">Something went wrong</h3>

        <p class="text-muted mt-2">
            {{ message|default:"An unexpected error occurred. Please try again." }}
        </p>

        <a href="/" class="btn btn-dark mt-3">← Go Back</a>

    </div>
</div>

</body>
</html>
